name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read
  checks: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      # Dummies — NUNCA credenciales reales. Los tests usan ENV=test
      # + el endpoint /auth/test/login para sesión sin Google OAuth.
      ENV: test
      SESSION_SECRET: ci-dummy-secret-not-for-production
      GOOGLE_CLIENT_ID: ci-dummy-client-id
      GOOGLE_CLIENT_SECRET: ci-dummy-secret
      ADMIN_EMAILS: jgomez@phicus.es,epastor@phicus.es
      BASE_URL: http://localhost:5173
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e "./backend[dev]"

      - name: Lint (ruff)
        run: ruff check backend/src backend/tests

      - name: Format check (black)
        if: always()
        run: black --check backend/src backend/tests

      - name: Tests (pytest)
        if: always()
        run: pytest backend/tests --junitxml=backend-junit.xml

      - name: Upload JUnit XML (backend)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-junit-${{ github.sha }}
          path: backend-junit.xml
          retention-days: 14

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        run: npm ci

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Lint (eslint + prettier)
        if: always()
        run: npm run lint:check

      - name: Tests (vitest)
        if: always()
        run: npm run test:ci

      - name: Build (vite)
        if: always()
        run: npm run build

      - name: Upload JUnit XML (frontend)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-junit-${{ github.sha }}
          path: frontend/frontend-junit.xml
          retention-days: 14

      - name: Upload dist (release)
        if: success() && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 90

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker compose build

      - name: Save image to tarball
        run: |
          IMAGE=$(docker compose config --images | head -n1)
          docker save "$IMAGE" | gzip > kratos-image.tar.gz
          ls -lh kratos-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: kratos-image-${{ github.sha }}
          path: kratos-image.tar.gz
          retention-days: 90
